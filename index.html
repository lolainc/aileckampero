<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aileckampero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            position: absolute;
            top: 0;
        }

        .container img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .active {
            opacity: 1;
        }

        .button-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .button-overlay button {
            padding: 12px 24px;
            font-size: 1.2em;
            color: white;
            background-color: #ff9800;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button-overlay button:hover {
            background-color: #e68900;
        }

        .image-container {
    max-width: 90%;
    max-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    background-color: white;
    padding: 20px;
    position: relative;  /* Necesario para que el botón se posicione encima de la imagen */
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;  /* Ajusta la imagen sin distorsionarla */
}

.image-container button {
    position: absolute;  /* Posiciona el botón encima de la imagen */
    top: 10px;  /* Ajusta la distancia desde la parte superior de la imagen */
    left: 50%;
    transform: translateX(-50%);  /* Centra el botón horizontalmente */
    padding: 10px 20px;
    font-size: 1.2em;
    border-radius: 5px;
    cursor: pointer;
}


    </style>
</head>
<body>
    <div class="container active">
        <div class="image-container">
            <img src="1.jpg" alt="Agradecimiento">
        </div>
    </div>
    <div class="container">
        <div class="image-container">
            <img src="2.jpg" alt="Info">
        </div>
    </div>
    <div class="container">
        <div class="image-container">
            <img src="3.jpg" alt="Link">
            <button class="btn btn-warning" onclick="window.location.href='https://celiacueros.empretienda.com.ar/'">Hace click ACÁ</button>
        </div>
    </div>
    
    
    
    
    

<script>
    const containers = document.querySelectorAll(".container");
    let currentIndex = 0;
    let startY = 0;
    let isScrolling = false;  // Para evitar múltiples desplazamientos al mismo tiempo

    function showContainer(index) {
        containers.forEach((container, i) => {
            container.classList.toggle("active", i === index);
        });
    }

    function handleScroll(event) {
        if (isScrolling) return;  // Evita desplazamientos simultáneos
        isScrolling = true;  // Bloquea el desplazamiento

        if (event.deltaY > 0 && currentIndex < containers.length - 1) {
            currentIndex++;
        } else if (event.deltaY < 0 && currentIndex > 0) {
            currentIndex--;
        }

        showContainer(currentIndex);

        setTimeout(() => isScrolling = false, 800);  // Permite desplazarse después de 800ms para que sea más lento
    }

    function handleTouchStart(event) {
        startY = event.touches[0].clientY;
    }

    function handleTouchMove(event) {
        let endY = event.touches[0].clientY;
        let deltaY = startY - endY;

        if (Math.abs(deltaY) > 20 && !isScrolling) {  // Reducir aún más el umbral a 20px para más suavidad
            if (deltaY > 0 && currentIndex < containers.length - 1) {
                currentIndex++;
            } else if (deltaY < 0 && currentIndex > 0) {
                currentIndex--;
            }

            showContainer(currentIndex);
            isScrolling = true;  // Evita desplazamientos múltiples
            setTimeout(() => isScrolling = false, 800);  // Espera más tiempo antes de permitir otro desplazamiento
        }
    }

    window.addEventListener("wheel", handleScroll);
    window.addEventListener("touchstart", handleTouchStart);
    window.addEventListener("touchmove", handleTouchMove);
</script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
